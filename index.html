  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .avatar-wrap { position: relative; }
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6e40c9, #1f6feb, #388bfd);
      z-index: 0;
    }

    .avatar {
      position: relative;
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid #0a0a0f;
      z-index: 1;
      display: block;
    }

    .username {
      font-size: 22px;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: -0.4px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    }

    .links { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }

    .links a {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(230, 237, 243, 0.6);
      font-size: 13.5px;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .links a:hover { color: #88b4ff; }
    .links a svg { opacity: 0.5; flex-shrink: 0; }
    .links a:hover svg { opacity: 1; }
  </style>
</head>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H;

    const blobs = [
      { x: 0, y: 0, r: 280, vx: 0.3, vy: 0.2, color: '110,64,201' },
      { x: 0, y: 0, r: 260, vx: -0.25, vy: 0.35, color: '31,111,235' },
      { x: 0, y: 0, r: 220, vx: 0.2, vy: -0.3, color: '56,139,253' },
      { x: 0, y: 0, r: 200, vx: -0.35, vy: -0.2, color: '88,166,255' },
      { x: 0, y: 0, r: 180, vx: 0.15, vy: 0.4, color: '100,50,220' },
    ];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      blobs.forEach((b, i) => {
        if (!b.initialized) {
          b.x = Math.random() * W;
          b.y = Math.random() * H;
          b.initialized = true;
        }
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      for (const b of blobs) {
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, `rgba(${b.color},0.22)`);
        grad.addColorStop(1, `rgba(${b.color},0)`);
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        b.x += b.vx;
        b.y += b.vy;
        if (b.x < -b.r) b.x = W + b.r;
        if (b.x > W + b.r) b.x = -b.r;
        if (b.y < -b.r) b.y = H + b.r;
        if (b.y > H + b.r) b.y = -b.r;
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
