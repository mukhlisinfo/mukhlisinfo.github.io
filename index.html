<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mukhlisinfo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: #6e40c9; top: -100px; left: -100px; }
    .blob-2 { width: 350px; height: 350px; background: #1f6feb; bottom: -80px; right: -80px; }
    .blob-3 { width: 250px; height: 250px; background: #388bfd; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .avatar-wrap { position: relative; }
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6e40c9, #1f6feb, #388bfd);
      z-index: 0;
    }

    .avatar {
      position: relative;
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid #0a0a0f;
      z-index: 1;
      display: block;
    }

    .username {
      font-size: 22px;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: -0.4px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    }

    .links { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }

    .links a {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(230, 237, 243, 0.6);
      font-size: 13.5px;
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .links a:hover { color: #88b4ff; }
    .links a svg { opacity: 0.5; flex-shrink: 0; }
    .links a:hover svg { opacity: 1; }
  </style>
</head>

  <div class="blob blob-1"></div>

  <div class="blob blob-3"></div>
