<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mukhlisinfo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 40px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid #30363d;
    }

    .username {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
      letter-spacing: -0.3px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #21262d;
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .links a {
      color: #8b949e;
      font-size: 14px;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .links a:hover { color: #58a6ff; }
  </style>
</head>
<body>
  <div class="card">
    <img
      class="avatar"
      src="https://avatars.githubusercontent.com/u/76395625?v=4&size=96"
      alt="mukhlisinfo"
    />
    <span class="username">mukhlisinfo</span>
    <div class="divider"></div>
    <div class="links">
      <a href="https://github.com/mukhlisinfo/" target="_blank">github.com/mukhlisinfo</a>
      <a href="mailto:mukhlisinfo@gmail.com">mukhlisinfo@gmail.com</a>
    </div>
  </div>
</body>
</html>
