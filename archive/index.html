<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Archive – mukhlisinfo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .heading {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: border-color 0.2s ease, transform 0.2s ease;
      width: 220px;
    }

    .card:hover {
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-4px);
    }

    .logo-wrap {
      width: 120px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      filter: brightness(0.85);
      transition: filter 0.2s ease;
    }

    .card:hover .logo-wrap img {
      filter: brightness(1);
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
    }

    .site-name {
      font-size: 13px;
      color: rgba(230, 237, 243, 0.45);
      letter-spacing: 0.02em;
    }

    .badge {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 3px 10px;
      letter-spacing: 0.05em;
    }

    .back {
      font-size: 12.5px;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>

  <div class="container">
    <span class="heading">Archive</span>

    <div class="cards">

      <div class="card">
        <div class="logo-wrap">
          <img src="https://jurudesain.com/wp-content/uploads/2025/01/cropped-Jurudesain.com-logo.webp" alt="Jurudesain.com"/>
        </div>
        <div class="divider"></div>
        <span class="site-name">jurudesain.com</span>
        <span class="badge">Closed 2026</span>
      </div>

      <div class="card">
        <div class="logo-wrap">
          <img src="https://landingspage.net/wp-content/uploads/2025/09/cropped-Logo-LandingsPage.net_.png" alt="LandingsPage.net"/>
        </div>
        <div class="divider"></div>
        <span class="site-name">landingspage.net</span>
        <span class="badge">Closed 2026</span>
      </div>

    </div>

    <a class="back" href="index.html">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      mukhlisinfo
    </a>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H;

    const blobs = [
      { x: 0, y: 0, r: 280, vx: 0.3,   vy: 0.2,  color: '110,64,201' },
      { x: 0, y: 0, r: 260, vx: -0.25, vy: 0.35, color: '31,111,235' },
      { x: 0, y: 0, r: 220, vx: 0.2,   vy: -0.3, color: '56,139,253' },
      { x: 0, y: 0, r: 200, vx: -0.35, vy: -0.2, color: '88,166,255' },
      { x: 0, y: 0, r: 180, vx: 0.15,  vy: 0.4,  color: '100,50,220' },
    ];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      blobs.forEach(b => {
        if (!b.initialized) {
          b.x = Math.random() * W;
          b.y = Math.random() * H;
          b.initialized = true;
        }
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, W, H);

      for (const b of blobs) {
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
        grad.addColorStop(0, `rgba(${b.color},0.22)`);
        grad.addColorStop(1, `rgba(${b.color},0)`);
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        b.x += b.vx;
        b.y += b.vy;
        if (b.x < -b.r) b.x = W + b.r;
        if (b.x > W + b.r) b.x = -b.r;
        if (b.y < -b.r) b.y = H + b.r;
        if (b.y > H + b.r) b.y = -b.r;
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
  </script>
</body>
</html>
